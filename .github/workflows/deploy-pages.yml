name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/appfinanceiro"
          # NEXT_PUBLIC_* vão para o bundle do navegador (não são secretos)
          NEXT_PUBLIC_SUPABASE_URL: https://jkxpylvtkuqygcprcwfy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_-uD9oFX05NC4fCBby0CnFQ_4DW1Ji-o
          NEXT_PUBLIC_ADMIN_EMAIL: lucaspweb@gmail.com

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
